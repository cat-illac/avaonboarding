<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Avakin · Admin</title>
<meta name="viewport" content="width=1280, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d1a;
    color: #e8e8f0;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── AUTH GATE ── */
  #auth-gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .auth-card {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 20px;
    padding: 40px 48px;
    text-align: center;
    max-width: 400px;
    width: 90%;
  }
  .auth-card h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 28px;
    color: #fff;
    margin-bottom: 8px;
  }
  .auth-card p { color: rgba(255,255,255,.5); margin-bottom: 28px; font-size: 13px; }
  .auth-input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 10px;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color .2s;
  }
  .auth-input:focus { border-color: #22d3ee; }
  .auth-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #0891b2, #60a5fa);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity .2s;
  }
  .auth-btn:hover { opacity: .9; }
  .auth-error { color: #ff637e; font-size: 12px; margin-top: 10px; }

  /* ── MAIN ── */
  #main { display: none; }

  .topbar {
    padding: 24px 32px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 22px;
    color: #fff;
    flex: 1;
  }
  .topbar-meta { color: rgba(255,255,255,.4); font-size: 12px; }
  .search-input {
    padding: 9px 16px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 9999px;
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    width: 220px;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: #22d3ee; }
  .search-input::placeholder { color: rgba(255,255,255,.3); }

  .content { padding: 28px 32px; }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 80px 0;
    color: rgba(255,255,255,.3);
  }
  .empty p { font-size: 15px; margin-bottom: 6px; }
  .empty small { font-size: 12px; }

  /* ── SESSION GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
  }

  .card {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.09);
    border-radius: 20px;
    overflow: hidden;
    transition: border-color .2s, transform .15s;
    cursor: default;
  }
  .card:hover {
    border-color: rgba(34,211,238,.3);
    transform: translateY(-2px);
  }

  .card-top {
    display: flex;
    gap: 16px;
    padding: 20px 20px 0;
  }

  .avatar-wrap {
    flex-shrink: 0;
    width: 88px;
    height: 120px;
    border-radius: 14px;
    overflow: hidden;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
  }
  .avatar-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
  }
  .avatar-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    opacity: .3;
  }

  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-family: 'Libre Baskerville', serif;
    font-size: 17px;
    color: #fff;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-time {
    font-size: 11px;
    color: rgba(255,255,255,.35);
    margin-bottom: 12px;
    letter-spacing: .04em;
  }

  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 9999px;
    font-size: 11px;
    font-weight: 600;
    background: rgba(255,255,255,.08);
    color: rgba(255,255,255,.65);
    border: 1px solid rgba(255,255,255,.08);
  }
  .pill.cyan { background: rgba(8,145,178,.15); color: #22d3ee; border-color: rgba(34,211,238,.2); }
  .pill.pink { background: rgba(251,100,182,.12); color: #fb64b6; border-color: rgba(251,100,182,.2); }

  .swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.2);
    display: inline-block;
  }

  .card-body { padding: 14px 20px 0; }

  .answer-row {
    display: flex;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,.05);
    align-items: flex-start;
  }
  .answer-row:last-child { border-bottom: none; }
  .answer-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(255,255,255,.3);
    white-space: nowrap;
    min-width: 70px;
    padding-top: 1px;
  }
  .answer-value {
    font-size: 13px;
    color: rgba(255,255,255,.8);
    line-height: 1.4;
    word-break: break-word;
  }
  .answer-value.identity {
    font-style: italic;
    color: #fff;
    font-size: 13px;
  }

  .card-footer {
    padding: 12px 20px 16px;
    margin-top: 4px;
  }
  .prompt-toggle {
    background: none;
    border: none;
    color: rgba(34,211,238,.7);
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
    letter-spacing: .04em;
  }
  .prompt-toggle:hover { color: #22d3ee; }
  .prompt-text {
    display: none;
    margin-top: 8px;
    font-size: 11px;
    line-height: 1.6;
    color: rgba(255,255,255,.4);
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'DM Mono', 'Courier New', monospace;
    word-break: break-word;
  }

  /* ── LOADING ── */
  .loading {
    text-align: center;
    padding: 60px;
    color: rgba(255,255,255,.4);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(34,211,238,.2);
    border-top-color: #22d3ee;
    animation: spin .8s linear infinite;
    margin-bottom: 14px;
  }
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="auth-gate">
  <div class="auth-card">
    <h1>Ava · Sessions</h1>
    <p>Enter your admin key to view player responses and generated avatars.</p>
    <input
      id="key-input"
      class="auth-input"
      type="password"
      placeholder="Admin key"
      autocomplete="off"
    />
    <button class="auth-btn" onclick="login()">View sessions →</button>
    <div id="auth-error" class="auth-error"></div>
  </div>
</div>

<!-- MAIN DASHBOARD -->
<div id="main">
  <div class="topbar">
    <div class="topbar-title">Ava · Sessions</div>
    <input
      id="search"
      class="search-input"
      type="text"
      placeholder="Search by name, identity…"
      oninput="renderSessions()"
    />
    <span id="session-count" class="topbar-meta"></span>
  </div>
  <div class="content">
    <div id="sessions-container"></div>
  </div>
</div>

<script>
  let allSessions = [];
  let adminKey = '';

  // ── Check URL for key (bookmarkable admin link) ──────────────────
  const urlKey = new URLSearchParams(location.search).get('key');
  if (urlKey) {
    document.getElementById('key-input').value = urlKey;
    login();
  }

  function login() {
    const key = document.getElementById('key-input').value.trim();
    if (!key) return;
    adminKey = key;
    loadSessions();
  }

  document.getElementById('key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function loadSessions() {
    document.getElementById('sessions-container').innerHTML =
      '<div class="loading"><div class="spinner"></div><br>Loading sessions…</div>';

    const res = await fetch(`/.netlify/functions/get-sessions?key=${encodeURIComponent(adminKey)}`);
    const errEl = document.getElementById('auth-error');

    if (!res.ok) {
      let msg = `Error ${res.status}`;
      try {
        const body = await res.json();
        msg = body.error || msg;
      } catch {}
      errEl.textContent = res.status === 401 ? 'Incorrect key — try again.' : msg;
      return;
    }

    allSessions = await res.json();

    // Show main, hide auth
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('main').style.display = 'block';

    // Update URL so it's bookmarkable
    history.replaceState(null, '', `?key=${encodeURIComponent(adminKey)}`);

    renderSessions();
  }

  // ── Hair / eye colour swatches ───────────────────────────────────
  const HAIR_COLORS = {
    blonde:   '#e8d5a3', brunette: '#5c3317', black:  '#1a1a1a',
    red:      '#b22222', silver:   '#c0c0c0', pink:   '#e75480', blue: '#4169e1',
  };
  const EYE_COLORS = {
    brown: '#6b3a2a', blue: '#4682b4', green: '#228b22',
    hazel: '#8b7355', grey: '#808080', amber: '#ffbf00',
  };

  function swatch(color, label) {
    return `<span class="swatch" style="background:${color}" title="${label}"></span>`;
  }

  function formatDate(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' });
  }

  function renderSessions() {
    const query = (document.getElementById('search').value || '').toLowerCase();
    const filtered = allSessions.filter(s => {
      if (!query) return true;
      return [s.name, s.identity, s.feel, s.era, s.song, s.presents]
        .some(v => (v || '').toLowerCase().includes(query));
    });

    document.getElementById('session-count').textContent =
      `${filtered.length} of ${allSessions.length} session${allSessions.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
      document.getElementById('sessions-container').innerHTML =
        `<div class="empty"><p>${allSessions.length === 0 ? 'No sessions yet.' : 'No results match your search.'}</p></div>`;
      return;
    }

    const html = filtered.map(s => {
      const hairColor = HAIR_COLORS[s.hair] || '#888';
      const eyeColor  = EYE_COLORS[s.eyes]  || '#888';
      const promptId  = `prompt-${s.sessionId}`;

      return `
        <div class="card">
          <div class="card-top">
            <div class="avatar-wrap">
              ${s.falImageUrl
                ? `<img src="${s.falImageUrl}" alt="avatar" loading="lazy" />`
                : `<div class="avatar-placeholder">✦</div>`}
            </div>
            <div class="card-info">
              <div class="card-name">${s.name || '(no name)'}</div>
              <div class="card-time">${formatDate(s.timestamp)}</div>
              <div class="pills">
                ${s.presents ? `<span class="pill cyan">${s.presents}</span>` : ''}
                ${s.era      ? `<span class="pill">${s.era}</span>` : ''}
                ${s.feel     ? `<span class="pill pink">${s.feel}</span>` : ''}
                ${s.hair     ? `<span class="pill">${swatch(hairColor, s.hair)} ${s.hair}</span>` : ''}
                ${s.eyes     ? `<span class="pill">${swatch(eyeColor, s.eyes)} ${s.eyes}</span>` : ''}
              </div>
            </div>
          </div>

          <div class="card-body">
            ${s.identity ? `
              <div class="answer-row">
                <div class="answer-label">Identity</div>
                <div class="answer-value identity">"${s.identity}"</div>
              </div>` : ''}
            ${s.song ? `
              <div class="answer-row">
                <div class="answer-label">Song</div>
                <div class="answer-value">${s.song}</div>
              </div>` : ''}
          </div>

          <div class="card-footer">
            <button class="prompt-toggle" onclick="togglePrompt('${promptId}', this)">
              ↓ show prompt
            </button>
            <div id="${promptId}" class="prompt-text">${s.prompt || '(no prompt saved)'}</div>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('sessions-container').innerHTML = `<div class="grid">${html}</div>`;
  }

  function togglePrompt(id, btn) {
    const el = document.getElementById(id);
    const open = el.style.display === 'block';
    el.style.display = open ? 'none' : 'block';
    btn.textContent = open ? '↓ show prompt' : '↑ hide prompt';
  }
</script>
</body>
</html>
