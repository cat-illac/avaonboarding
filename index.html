<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const T = {

// ─── FAL.PRO IMAGE GENERATION ────────────────────────────────────
async function generateFalAvatar(profile, customPrompt = '') {
  // key is optional — if absent the call routes through /.netlify/functions/generate-avatar
  const key = window.FAL_API_KEY || '';

  // ── Gender ───────────────────────────────────────────────────────
  const genderMap = { 'Female': 'young woman', 'Male': 'young man', 'Non-binary': 'person', 'surprise me': 'person' };
  const gender = genderMap[profile.presents] || 'young woman';

  // ── Identity — the PRIMARY creative brief ────────────────────────
  // This must lead the prompt so the model treats it as the headline concept.
  const identityCore = profile.identity
    ? `A fashion avatar that fully embodies the concept of "${profile.identity}". Every element — the outfit, styling, accessories, colour palette, and mood — must express "${profile.identity}" from head to toe.`
    : `A high-fashion CGI avatar.`;

  // ── Era → silhouette + material language ────────────────────────
  const eraMap = {
    'Victorian':         'Victorian era silhouette — corseted or high-waisted, voluminous skirts or structured layers, rich velvet and silk fabrics, ornate lace and embroidery details, jewel tones and deep burgundy with gilded accents',
    'the 90s':           'minimalist 1990s silhouette — slip dresses, sharp tailored separates, muted palette with occasional colour pop, clean lines and considered simplicity',
    'Y2K':               'Y2K futuristic silhouette — iridescent holographic pleats, glossy synthetic fabrics, white and pastel holographic palette with metallic gold accents, playful and bold proportions',
    '10 years from now': 'avant-garde near-future silhouette — technical luxury fabrics, architectural sculptural shapes, clean neutral palette with luminous metallic and light-reactive accents',
  };
  const eraStyle = eraMap[profile.era] || '';

  // ── Feel → social energy ─────────────────────────────────────────
  const vibeMap = {
    'intrigued':         'magnetic and quietly compelling, high social intrigue, refined cool-girl energy',
    'charmed':           'warm and captivating, effortlessly charming, golden-hour glow energy',
    'underestimated':    'quietly powerful, deceptively simple exterior concealing unmistakable status, composed and knowing',
    'a little feral':    'electric and untamed, high energy with sharp edge, bold and attention-commanding',
  };
  const vibe = vibeMap[profile.feel] || 'confident and aspirational';
  const songRef = profile.song ? ` The overall feeling should echo the energy of "${profile.song}".` : '';

  // ── Hair & eyes ──────────────────────────────────────────────────
  const hairDesc = profile.hair ? `${profile.hair} hair` : 'blonde hair';
  const eyesDesc = profile.eyes ? `${profile.eyes} eyes` : 'blue eyes';

  // ── Assemble prompt ──────────────────────────────────────────────
  // The opening lines are the highest-weight tokens for FLUX.
  // Lock in the person first (gender, hair, eyes, identity), then
  // layer era/vibe/outfit on top so those details never get ignored.

  const characterAnchor = `${gender}, ${hairDesc}, ${eyesDesc}${profile.identity ? `, embodying "${profile.identity}"` : ''}.`;
  const identityVibe    = `${profile.identity ? `The entire look — outfit, styling, accessories, colour palette — must express "${profile.identity}". ` : ''}${vibe} energy.${songRef}`;
  const bodyFaceHair    = `Full-body fashion avatar with elegant proportions, slim build, refined doll-like facial features, luminous skin, large expressive ${eyesDesc}, small nose, glossy full lips, soft blush, and ${hairDesc} styled to match the concept.`;
  const outfitSilhouette = `Outfit: ${profile.identity ? `garments that visually express "${profile.identity}"` : 'high-fashion editorial look'}${eraStyle ? '; ' + eraStyle : ''}. Silhouette, styling, accessories and footwear must all reinforce the identity.`;
  const materials        = `Materials and colour: ${profile.identity ? `palette and textures chosen to express "${profile.identity}"` : 'high-quality luxury materials, iridescent or textured finishes, premium palette'}${eraStyle ? ', appropriate to the era' : ''}.`;
  const accessories      = `Accessories and footwear: ${profile.identity ? `chosen to complete the "${profile.identity}" concept` : 'complementary fashion accessories and footwear'}.`;
  const pose        = `Pose: ALWAYS full-body head-to-toe, complete figure visible from crown to feet, no cropping. Full-body editorial pose, relaxed and self-aware, one leg lightly crossing in front of the other, calm confidence. The entire body including footwear MUST be visible in the frame.`;
  const renderStyle = `Render style: MUST be high-end beauty CGI. Airbrushed realism, smooth polished skin, clean contour definition, sharp garment construction, premium stylised 3D finish, collectible avatar appeal, minimal luxury studio background. Not illustration, not photography, not painting.`;
  const customPart  = customPrompt ? ` Additional styling notes: ${customPrompt}.` : '';

  const negativeText     = `not painterly, not brushy, not sketch-like, no visible paint texture, no concept art looseness, no messy shading, no rough render, no broken anatomy, no distorted hands, no malformed footwear, no cropped figure, no cut-off legs, no missing feet`;
  const negativeInPrompt = `Avoid: ${negativeText}.`;

  // Character anchor is token 1 — gender + hair + eyes + identity lock in the person
  // before any stylistic language can override them.
  const prompt = `${characterAnchor} Full-length stylised CGI fashion avatar. ${identityVibe} ${bodyFaceHair} ${outfitSilhouette} ${materials} ${accessories} ${pose} ${renderStyle}${customPart} ${negativeInPrompt}`;

  // Route through the Netlify serverless proxy so the key stays server-side.
  // Falls back to direct fal.run if a client key is present (local dev only).
  const endpoint = key
    ? 'https://fal.run/fal-ai/flux/schnell'
    : '/.netlify/functions/generate-avatar';

  const headers = key
    ? { 'Authorization': `Key ${key}`, 'Content-Type': 'application/json' }
    : { 'Content-Type': 'application/json' };

  const res = await fetch(endpoint, {
    method: 'POST',
    headers,
    body: JSON.stringify({
      prompt,
      negative_prompt: negativeText,
      image_size: 'portrait_4_3',
      num_inference_steps: 4,
      num_images: 1,
    }),
  });
  if (!res.ok) return null;
  const data = await res.json();
  const url = data.images?.[0]?.url ?? null;
  return url ? { url, prompt } : null;
}

// ─── SESSION SAVING ───────────────────────────────────────────────
async function saveSession(profile, falImageUrl) {
  try {
    await fetch('/.netlify/functions/save-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId:   crypto.randomUUID(),
        timestamp:   new Date().toISOString(),
        name:        profile.name        || '',
        identity:    profile.identity    || '',
        song:        profile.song        || '',
        era:         profile.era         || '',
        feel:        profile.feel        || '',
        presents:    profile.presents    || '',
        hair:        profile.hair        || '',
        eyes:        profile.eyes        || '',
        falImageUrl: falImageUrl         || '',
        prompt:      prompt              || '',
      }),
    });
  } catch (e) {
    // fire-and-forget — never block the UI
    console.warn('Session save failed:', e);
  }
}

async function saveSessionFromResult(profile, result) {
  if (!result) return;
  await saveSession(profile, result.url, result.prompt);
}

// ─── PRIMITIVES ───────────────────────────────────────────────────
function GlassPanel({ children, style = {}, elevated = false, ...rest }) {
  return (
    <div {...rest} style={{
      backgroundImage: T.rainbow,
      backdropFilter: elevated ? 'blur(24px) saturate(180%)' : 'blur(16px) saturate(160%)',
      WebkitBackdropFilter: elevated ? 'blur(24px) saturate(180%)' : 'blur(16px) saturate(160%)',
      border: '1px solid rgba(255,255,255,.4)',
      boxShadow: elevated ? '0 30px 60px -15px rgba(0,0,0,.3)' : '0 20px 40px rgba(55,56,49,.1)',
      borderRadius: 32,
      ...style,
    }}>{children}</div>
  );
}

function GlassSurface({ children, style = {}, ...rest }) {
  return (
    <div {...rest} style={{
      background: 'rgba(255,255,255,.18)',
      backdropFilter: 'blur(12px) saturate(160%)',
      WebkitBackdropFilter: 'blur(12px) saturate(160%)',
      border: '1px solid rgba(255,255,255,.3)',
      borderRadius: 9999,
      ...style,
    }}>{children}</div>
  );
}

function AvaPortrait({ size = 44, ring = true, talking = false }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: 9999, flexShrink: 0,
      border: ring ? '2px solid rgba(255,255,255,.7)' : 'none',
      boxShadow: ring ? `0 0 0 2px rgba(255,255,255,.4), 0 0 ${talking ? 22 : 0}px rgba(8,145,178,.5)` : 'none',
      backgroundImage: "url('assets/avatar-sarahlee.png')",
      backgroundSize: '220%',
      backgroundPosition: 'center 8%',
      transition: 'box-shadow .3s',
    }} />
  );
}

function Bubble({ text, side = 'left', delay = 0 }) {
  const left = side === 'left';
  return (
    <div style={{
      display: 'flex', flexDirection: 'column',
      alignItems: left ? 'flex-start' : 'flex-end',
      animation: `flo-bubble-in .4s ${delay}ms cubic-bezier(.34,1.56,.64,1) both`,
    }}>
      <div style={{
        padding: '11px 16px',
        borderRadius: left ? '20px 20px 20px 6px' : '20px 20px 6px 20px',
        background: left ? 'rgba(255,255,255,.78)' : T.gradient,
        color: left ? T.text : '#fff',
        fontFamily: T.sans, fontWeight: 500, fontSize: 15,
        maxWidth: 380, lineHeight: 1.5,
        boxShadow: left ? '0 2px 10px rgba(0,0,0,.06)' : '0 6px 16px rgba(8,145,178,.3)',
      }}>{text}</div>
    </div>
  );
}

function TypingDots() {
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: '11px 15px', background: 'rgba(255,255,255,.78)',
      borderRadius: '20px 20px 20px 6px',
      boxShadow: '0 2px 10px rgba(0,0,0,.06)',
      animation: 'flo-bubble-in .3s ease both',
    }}>
      {[0, 1, 2].map(i => (
        <div key={i} style={{
          width: 6, height: 6, borderRadius: 9999, background: T.cyan,
          animation: `flo-blink 1.2s ${i * 0.18}s infinite`,
        }} />
      ))}
    </div>
  );
}

function SendIcon({ size = 18 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
      <path d="M3 10l14-7-4 17-3-7-7-3z" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

// ─── TEXT INPUT ───────────────────────────────────────────────────
function TextInput({ onSubmit, placeholder }) {
  const [v, setV] = useState('');
  const ref = useRef(null);
  useEffect(() => { setTimeout(() => ref.current?.focus(), 350); }, []);
  const go = () => { const t = v.trim(); if (t) onSubmit(t); };
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      padding: '10px 10px 10px 20px',
      background: 'rgba(255,255,255,.58)',
      border: `1.5px solid ${v ? T.cyan : 'rgba(8,145,178,.3)'}`,
      borderRadius: 9999,
      boxShadow: v ? '0 0 0 4px rgba(8,145,178,.1)' : 'none',
      transition: 'border-color .2s, box-shadow .2s',
      animation: 'flo-chip-in .35s ease both',
    }}>
      <input
        ref={ref} value={v}
        onChange={e => setV(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && go()}
        placeholder={placeholder}
        style={{
          flex: 1, border: 'none', outline: 'none', background: 'transparent',
          fontFamily: T.sans, fontSize: 15, fontWeight: 500, color: T.text,
        }}
      />
      <button onClick={go} disabled={!v.trim()} style={{
        width: 40, height: 40, borderRadius: 9999, border: 'none',
        background: v.trim() ? T.gradient : 'rgba(8,145,178,.2)',
        color: '#fff', cursor: v.trim() ? 'pointer' : 'default',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        boxShadow: v.trim() ? '0 6px 14px rgba(8,145,178,.5)' : 'none',
        transition: 'all .2s',
      }}><SendIcon /></button>
    </div>
  );
}

// ─── CHOICE CHIPS ─────────────────────────────────────────────────
function ChoiceChips({ options, onPick, writeIn }) {
  const [picked, setPicked] = useState(null);
  const [writing, setWriting] = useState(false);
  const [custom, setCustom] = useState('');
  const ref = useRef(null);

  const go = (i) => {
    if (picked !== null) return;
    setPicked(i);
    setTimeout(() => onPick(options[i].v), 420);
  };

  const submitCustom = () => {
    const t = custom.trim();
    if (!t) return;
    onPick(t);
  };

  useEffect(() => { if (writing) setTimeout(() => ref.current?.focus(), 200); }, [writing]);

  return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        {options.map((opt, i) => {
          const on = i === picked;
          return (
            <button key={i} onClick={() => go(i)} disabled={picked !== null || writing} style={{
              padding: '14px 16px', borderRadius: 18, border: 'none',
              cursor: (picked !== null || writing) ? 'default' : 'pointer',
              background: on ? T.gradient : 'rgba(255,255,255,.55)',
              color: on ? '#fff' : T.text,
              fontFamily: T.sans, fontWeight: 600, fontSize: 14,
              display: 'flex', alignItems: 'center', gap: 10,
              boxShadow: on ? '0 8px 18px rgba(8,145,178,.4)' : '0 2px 8px rgba(0,0,0,.05)',
              transform: on ? 'scale(1.03)' : 'scale(1)',
              opacity: writing ? 0.5 : 1,
              transition: 'all .25s cubic-bezier(.34,1.56,.64,1)',
              animation: `flo-chip-in .35s ${i * 0.06}s ease both`,
            }}>
              <span style={{ fontSize: 20 }}>{opt.emoji}</span>
              <span style={{ textAlign: 'left' }}>{opt.v}</span>
            </button>
          );
        })}
      </div>
      {writeIn && !writing && picked === null && (
        <button onClick={() => setWriting(true)} style={{
          marginTop: 10, width: '100%', padding: '10px 14px',
          borderRadius: 9999, border: '1px dashed rgba(8,145,178,.4)',
          background: 'rgba(255,255,255,.3)', color: T.cyan,
          fontFamily: T.sans, fontWeight: 600, fontSize: 13,
          cursor: 'pointer',
        }}>✎ {writeIn}</button>
      )}
      {writing && (
        <div style={{
          marginTop: 10, display: 'flex', alignItems: 'center', gap: 8,
          padding: '8px 8px 8px 18px',
          background: 'rgba(255,255,255,.6)',
          border: `1.5px solid ${T.cyan}`,
          borderRadius: 9999,
          animation: 'flo-chip-in .3s ease both',
        }}>
          <input
            ref={ref} value={custom}
            onChange={e => setCustom(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') submitCustom(); if (e.key === 'Escape') setWriting(false); }}
            placeholder="your own answer…"
            style={{
              flex: 1, border: 'none', outline: 'none', background: 'transparent',
              fontFamily: T.sans, fontSize: 14, fontWeight: 500, color: T.text,
            }}
          />
          <button onClick={() => setWriting(false)} style={{
            padding: '8px 12px', borderRadius: 9999, border: 'none',
            background: 'transparent', color: T.muted,
            fontFamily: T.sans, fontSize: 12, fontWeight: 600, cursor: 'pointer',
          }}>cancel</button>
          <button onClick={submitCustom} disabled={!custom.trim()} style={{
            width: 36, height: 36, borderRadius: '50%', border: 'none',
            background: custom.trim() ? T.gradient : 'rgba(8,145,178,.2)',
            color: '#fff', cursor: custom.trim() ? 'pointer' : 'default',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}><SendIcon size={16} /></button>
        </div>
      )}
    </div>
  );
}

// ─── APPEARANCE PICKER ───────────────────────────────────────────
function AppearancePicker({ groups, onPick }) {
  const [selections, setSelections] = useState({});

  const select = (groupId, value) => {
    const next = { ...selections, [groupId]: value };
    setSelections(next);
    if (Object.keys(next).length === groups.length) {
      setTimeout(() => onPick(next), 420);
    }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 18, animation: 'flo-chip-in .35s ease both' }}>
      {groups.map((group, gi) => (
        <div key={group.id}>
          <div style={{
            fontFamily: T.sans, fontSize: 11, fontWeight: 700,
            letterSpacing: '.16em', textTransform: 'uppercase',
            color: T.cyan, marginBottom: 8, opacity: .9,
          }}>{group.label}</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {group.options.map((opt, i) => {
              const isColor = !!opt.color;
              const picked = selections[group.id] === opt.v;
              const anyPicked = selections[group.id] !== undefined;
              return isColor ? (
                <button key={i} title={opt.v} onClick={() => select(group.id, opt.v)}
                  disabled={anyPicked}
                  style={{
                    width: 34, height: 34, borderRadius: '50%', border: 'none',
                    background: opt.color, cursor: anyPicked ? 'default' : 'pointer',
                    boxShadow: picked
                      ? `0 0 0 3px #fff, 0 0 0 5px ${T.cyan}`
                      : '0 2px 8px rgba(0,0,0,.2)',
                    transform: picked ? 'scale(1.2)' : 'scale(1)',
                    opacity: anyPicked && !picked ? 0.35 : 1,
                    transition: 'all .2s cubic-bezier(.34,1.56,.64,1)',
                    animation: `flo-chip-in .3s ${i * 0.04}s ease both`,
                  }}
                />
              ) : (
                <button key={i} onClick={() => select(group.id, opt.v)}
                  disabled={anyPicked}
                  style={{
                    padding: '8px 16px', borderRadius: 9999, border: 'none',
                    cursor: anyPicked ? 'default' : 'pointer',
                    background: picked ? T.gradient : 'rgba(255,255,255,.55)',

function ChatScene({ onComplete }) {
  const [step, setStep] = useState(0);
  const [msgs, setMsgs] = useState([]);
  const [typing, setTyping] = useState(false);
  const [show, setShow] = useState(false);
  const [profile, setProfile] = useState({});
  const scrollRef = useRef(null);
  const started = useRef(false);

  const pushAva = useCallback((texts, onDone) => {
    let off = 0;
    texts.forEach((t, i) => {
      const tAt = i === 0 ? 400 + off : off + 700;
      const mAt = tAt + 900;
      off = mAt;
      setTimeout(() => setTyping(true), tAt);
      setTimeout(() => {
        setTyping(false);
        setMsgs(p => [...p, { text: t, side: 'left' }]);
        if (i === texts.length - 1 && onDone) setTimeout(onDone, 300);
      }, mAt);
    });
  }, []);

  useEffect(() => {
    if (started.current) return;
    started.current = true;
    const q = window.QUESTIONS[0];
    pushAva(typeof q.ava === 'function' ? q.ava() : q.ava, () => setShow(true));
  }, [pushAva]);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [msgs, typing, show]);

  const handleAnswer = (value) => {
    const q = window.QUESTIONS[step];
    // For appearance questions, value is an object like { presents, hair, eyes }
    // — spread each key directly into the profile rather than nesting under q.id
    const newProfile = q.kind === 'appearance'
      ? { ...profile, ...value }
      : { ...profile, [q.id]: value };
    setProfile(newProfile);
    setShow(false);

    // Build a readable summary for the chat bubble
    let displayText;
    if (q.kind === 'appearance') {
      displayText = Object.values(value).join(' · ');
    } else {
      displayText = value;
    }
    setMsgs(p => [...p, { text: displayText, side: 'right' }]);

    const nextStep = step + 1;
    if (nextStep >= window.QUESTIONS.length) {
      setTimeout(() => {
        pushAva([
          "That's everything I need — you're going to love this.",
          `Give me just a moment${newProfile.name ? ', ' + newProfile.name : ''}.`,
        ], () => setTimeout(() => onComplete(newProfile), 1200));
      }, 200);
      return;
    }

    const nq = window.QUESTIONS[nextStep];
    const avaTexts = typeof nq.ava === 'function' ? nq.ava(value) : nq.ava;
    setTimeout(() => {
      pushAva(avaTexts, () => { setStep(nextStep); setShow(true); });
    }, 250);
  };

  const q = window.QUESTIONS[step];

  return (
    <div style={{
      position: 'absolute', inset: 0, overflow: 'hidden',
      background: "url('assets/bg-palmsprings.png') center / cover no-repeat",
      animation: 'flo-fade-in .6s ease both',

      <div style={{
        position: 'absolute', inset: 0,

      }} />

      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        gap: 72, padding: '60px 80px',
      }}>
        {/* LEFT — Ava portrait */}
        <div style={{
          flex: '0 1 460px', position: 'relative', height: '85%',
          display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
        }}>
          <div style={{
            position: 'absolute', inset: '-5% -10% -5% -10%',
            background: 'radial-gradient(circle at 50% 55%, rgba(251,100,182,.35), transparent 65%)',
            animation: 'flo-pulse 4s ease-in-out infinite',
          }} />
          <div style={{
            width: '100%', height: '100%',
            backgroundImage: "url('assets/avatar-sarahlee.png')",
            backgroundSize: 'contain', backgroundRepeat: 'no-repeat',
            backgroundPosition: 'center bottom',
            filter: 'drop-shadow(0 30px 60px rgba(0,0,0,.25))',
            animation: 'flo-float 6s ease-in-out infinite',
          }} />
          <div style={{
            position: 'absolute', top: '6%', left: '50%', transform: 'translateX(-50%)',
            padding: '7px 16px 7px 7px', display: 'flex', alignItems: 'center', gap: 9,
            background: 'rgba(255,255,255,.25)',
            backdropFilter: 'blur(14px)', WebkitBackdropFilter: 'blur(14px)',
            borderRadius: 9999, border: '1px solid rgba(255,255,255,.4)',

          }}>
            <AvaPortrait size={28} />
            <span style={{ fontFamily: T.sans, fontWeight: 700, fontSize: 14, color: '#fff' }}>Ava</span>
            <div style={{ width: 7, height: 7, borderRadius: 9999, background: T.success }} />
          </div>
        </div>

        {/* RIGHT — chat panel */}
        <div style={{ flex: '0 1 480px', display: 'flex', flexDirection: 'column', zIndex: 2 }}>
          <GlassPanel elevated style={{ padding: 0, overflow: 'hidden', maxHeight: '90vh', overflowY: 'auto' }}>

function ControlRow({ label, children }) {

// ─── ARRIVAL SCENE ────────────────────────────────────────────────
function ArrivalScene({ onArrived }) {
  const [phase, setPhase] = useState(0);
  useEffect(() => {
    const t1 = setTimeout(() => setPhase(1), 1400);
    const t2 = setTimeout(() => onArrived(), 2800);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  return (
    <div style={{
      position: 'absolute', inset: 0, overflow: 'hidden',
      background: "url('assets/bg-palmsprings.png') center / cover no-repeat",
    }}>
      <div style={{ position: 'absolute', inset: 0,
        background: 'linear-gradient(160deg,rgba(255,182,193,.22),rgba(186,225,255,.3))' }} />
      <div style={{
        position: 'absolute', inset: 0,
        background: 'rgba(10,10,20,.55)',
        opacity: phase === 0 ? 1 : 0,
        transition: 'opacity 1.2s ease-out',
      }} />
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        color: '#fff', textAlign: 'center',
        opacity: phase === 0 ? 1 : 0,
        transform: phase === 0 ? 'translateY(0)' : 'translateY(-20px)',
        transition: 'opacity .8s ease-out, transform .8s ease-out',
        pointerEvents: 'none',
      }}>
        <div style={{
          fontFamily: T.sans, fontSize: 11, fontWeight: 700,
          letterSpacing: '.4em', textTransform: 'uppercase',
          color: 'rgba(255,255,255,.7)', marginBottom: 18,
          animation: 'flo-fade-in .6s ease both',
        }}>✦ now entering</div>
        <h1 style={{
          fontFamily: T.serif, fontSize: 72, fontWeight: 400,
          lineHeight: 1, margin: 0, color: '#fff',
          textShadow: '0 4px 40px rgba(0,0,0,.3)',
          letterSpacing: '-.02em',
          animation: 'flo-fade-in .8s .1s ease both',
        }}>Palm Springs Rooftop</h1>
        <div style={{
          fontFamily: T.sans, fontSize: 14, fontWeight: 500,
          color: 'rgba(255,255,255,.6)', marginTop: 14,
          animation: 'flo-fade-in 1s .3s ease both',
        }}>hosted by Ava · 21 here</div>
      </div>
      {[...Array(8)].map((_, i) => (
        <div key={i} style={{
          position: 'absolute',

function AskPanel({ onClose }) {
  const [msgs, setMsgs] = useState([
    { from: 'ava', text: "Hi! I'm here to help you find your way. Ask me anything about the party, friends, or features!" },
  ]);
  const [draft, setDraft] = useState('');
  const scrollRef = useRef(null);
  const quick = ["How do I change my avatar?","What music is playing?","How do I teleport?","Who's here?"];
  const reply = (q) => ({
    "How do I change my avatar?": "Tap ✨ Create in the bottom nav — you'll land right back in the dressing room. Tone, aura, accessories. Go wild.",
    "What music is playing?":     "DJ Marigold's Palm Springs Sunset Set. Tap 🎵 Music to preview other tracks or queue something weird.",
    "How do I teleport?":         "🌍 Travel shows every live party. Tap one, and you'll arrive in about two seconds.",
    "Who's here?":                "21 people, all lovely. Jules is by the pool. Mira's DJing. You keep scanning — you're safe.",
  }[q] || "Hmm — I don't have a good answer for that one. But I'll figure it out. Ask me something else?");

  const send = (text) => {
    if (!text.trim()) return;
    setMsgs(m => [...m, { from: 'me', text }]);
    setDraft('');
    setTimeout(() => setMsgs(m => [...m, { from: 'ava', text: reply(text) }]), 700);
  };

  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [msgs]);

  return (
    <NavPanel title="Ask Ava" subtitle="your party assistant" onClose={onClose} height={580}>

        marginBottom: 14, maxHeight: 290, overflowY: 'auto' }}>

          <div key={i} style={{ display: 'flex', gap: 8, justifyContent: m.from === 'me' ? 'flex-end' : 'flex-start' }}>
            {m.from === 'ava' && <AvaPortrait size={28} />}

              padding: '10px 14px', maxWidth: 280,
              borderRadius: m.from === 'me' ? '16px 16px 4px 16px' : '16px 16px 16px 4px',

              color: m.from === 'me' ? '#fff' : T.text,
              fontFamily: T.sans, fontSize: 13, lineHeight: 1.45, fontWeight: 500,
            }}>{m.text}</div>
          </div>
        ))}
      </div>
      <div style={{ fontFamily: T.sans, fontSize: 10, fontWeight: 700,
        letterSpacing: '.28em', color: T.cyan, marginBottom: 10 }}>QUICK QUESTIONS</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 14 }}>
        {quick.map(q => (
          <button key={q} onClick={() => send(q)} style={{
            padding: '8px 12px', borderRadius: 9999,
            background: 'rgba(255,255,255,.55)', border: '1px solid rgba(255,255,255,.5)',
            fontFamily: T.sans, fontWeight: 600, fontSize: 12, color: T.text, cursor: 'pointer',
          }}>{q}</button>
        ))}
      </div>
      <div style={{ display: 'flex', gap: 6, padding: 4,
        background: 'rgba(255,255,255,.5)', border: '1px solid rgba(255,255,255,.5)', borderRadius: 9999 }}>
        <input value={draft} onChange={e => setDraft(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && send(draft)}
          placeholder="Type a message..."

}

      avatar: 'assets/avatar-sarahlee.png', status: T.success, host: true,
      msgs: [{ from: 'Ava', text: "hey. stop pretending you're not here." }, { from: 'Ava', text: "jules is by the pool. go." }] },
    { id: 'jules', name: 'Jules', sub: 'hey! welcome 👋', time: '5m',
      avatar: 'assets/attendee-2.png', status: T.success,
      msgs: [{ from: 'Jules', text: "hey! welcome 👋" }, { from: 'Jules', text: "love the fit" }] },
    { id: 'mira',  name: 'Mira', sub: 'take a song request?', time: '18m',
      avatar: 'assets/attendee-1.png', status: T.success,
      msgs: [{ from: 'Mira', text: "take a song request?" }] },
    { id: 'theo',  name: 'Theo', sub: 'brb grabbing a drink', time: '1h',
      avatar: 'assets/attendee-4.png', status: '#c8c8c8',
      msgs: [{ from: 'Theo', text: "brb grabbing a drink" }] },
  ]);
  const [draft, setDraft] = useState('');
  const scrollRef = useRef(null);
  const current = openThread ? threads.find(t => t.id === openThread) : null;

  const send = () => {
    const t = draft.trim(); if (!t || !current) return;
    setThreads(prev => prev.map(th => th.id === current.id
      ? { ...th, msgs: [...th.msgs, { from: 'me', text: t }], sub: `You: ${t}`, time: 'now' } : th));
    setDraft('');
    if (current.id === 'ava') {
      setTimeout(() => setThreads(prev => prev.map(th => th.id === 'ava'
        ? { ...th, msgs: [...th.msgs, { from: 'Ava', text: 'good. go.' }] } : th)), 800);
    } else if (current.id !== 'room') {
      setTimeout(() => setThreads(prev => prev.map(th => th.id === current.id
        ? { ...th, msgs: [...th.msgs, { from: current.name, text: ['haha', 'omg same', 'be right there'][Math.floor(Math.random()*3)] }] } : th)), 900);
    }
  };

  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [current?.msgs]);

  return (
    <NavPanel
      title={current ? current.name : "Messages"}
      subtitle={current ? (current.group ? 'group · 4 members' : 'direct') : '5 conversations · 4 unread'}
      onClose={onClose} width={420} height={620}
    >
      {!current && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4, margin: '-6px 0' }}>
          {threads.map(th => (
            <button key={th.id} onClick={() => setOpenThread(th.id)} style={{
              display: 'flex', alignItems: 'center', gap: 12, padding: 10,
              borderRadius: 14, background: 'transparent', border: 'none',
              cursor: 'pointer', textAlign: 'left', transition: 'background .15s',
            }} onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,.4)'}
               onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <div style={{ position: 'relative', flexShrink: 0 }}>
                <div style={{ width: 48, height: 48, borderRadius: '50%',
                  backgroundImage: `url('${th.avatar}')`, backgroundSize: 'cover', backgroundPosition: 'center 15%',
                  border: '2px solid rgba(255,255,255,.7)', boxShadow: '0 0 0 2px rgba(255,255,255,.4)' }} />
                <div style={{ position: 'absolute', bottom: 0, right: 0,
                  width: 14, height: 14, borderRadius: '50%', background: th.status, border: '2px solid #fff' }} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <div style={{ fontFamily: T.sans, fontWeight: 700, fontSize: 15,
                    color: th.nameColor || T.text }}>{th.name}</div>
                  {th.host && <span style={{ fontFamily: T.sans, fontWeight: 700, fontSize: 9,
                    letterSpacing: '.16em', color: T.danger }}>HOST</span>}
                  <div style={{ marginLeft: 'auto', fontFamily: T.sans, fontSize: 10, color: T.muted }}>{th.time}</div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 2 }}>
                  <div style={{ flex: 1, fontFamily: T.sans, fontSize: 13, color: T.muted,
                    overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{th.sub}</div>
                  {th.unread > 0 && (
                    <div style={{ minWidth: 22, height: 22, padding: '0 7px', borderRadius: 9999,
                      background: T.warmGradient, color: '#fff',
                      fontFamily: T.sans, fontWeight: 700, fontSize: 11,

                    }}>{th.unread}</div>
                  )}
                </div>
              </div>
            </button>
          ))}
        </div>
      )}

      {current && (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <button onClick={() => setOpenThread(null)} style={{
            padding: '6px 10px', marginBottom: 10, alignSelf: 'flex-start',

            borderRadius: 9999, fontFamily: T.sans, fontSize: 11, fontWeight: 600, color: T.cyan, cursor: 'pointer',
          }}>← all messages</button>
          <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto',
            display: 'flex', flexDirection: 'column', gap: 6, paddingBottom: 10,
            minHeight: 200, maxHeight: 340 }}>
            {current.msgs.map((m, i) => {
              const mine = m.from === 'me';
              return (
                <div key={i} style={{ display: 'flex', gap: 8, justifyContent: mine ? 'flex-end' : 'flex-start' }}>

              display: 'flex', alignItems: 'center', justifyContent: 'center',

            <div style={{ fontFamily: T.sans, fontWeight: 700, fontSize: 15, color: T.text, marginBottom: 3 }}>
              Tweak your look
            </div>
            <div style={{ fontFamily: T.sans, fontSize: 13, color: T.muted, lineHeight: 1.4 }}>
              Change hair, skin, or add a custom prompt — Ava regenerates your avatar.
            </div>
          </div>
          <div style={{ marginLeft: 'auto', fontSize: 18, color: T.cyan, flexShrink: 0 }}>→</div>
        </button>

        {/* Option B — Restart chat */}
        <button onClick={() => { onClose(); onRestartWithAva(); }} style={{
          display: 'flex', alignItems: 'center', gap: 16,
          padding: '18px 20px', borderRadius: 20, border: 'none',
          background: 'linear-gradient(135deg,rgba(251,100,182,.12),rgba(255,137,4,.08))',
          cursor: 'pointer', textAlign: 'left', width: '100%',
          transition: 'all .2s',
        }}
        onMouseEnter={e => e.currentTarget.style.background = 'linear-gradient(135deg,rgba(251,100,182,.22),rgba(255,137,4,.15))'}
        onMouseLeave={e => e.currentTarget.style.background = 'linear-gradient(135deg,rgba(251,100,182,.12),rgba(255,137,4,.08))'}
        >
          <div style={{
            width: 48, height: 48, borderRadius: 16, flexShrink: 0,
            background: 'linear-gradient(135deg,#fb64b6,#ff8904)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 22, boxShadow: '0 6px 14px rgba(251,100,182,.35)',
          }}>✦</div>
          <div>
            <div style={{ fontFamily: T.sans, fontWeight: 700, fontSize: 15, color: T.text, marginBottom: 3 }}>
              Start fresh with Ava
            </div>
            <div style={{ fontFamily: T.sans, fontSize: 13, color: T.muted, lineHeight: 1.4 }}>
              Answer Ava's questions again and get a completely new look.
            </div>
          </div>
          <div style={{ marginLeft: 'auto', fontSize: 18, color: T.pink, flexShrink: 0 }}>→</div>
        </button>

      </div>
    </NavPanel>
  );
}

function PanelSection({ children }) {
  return (
    <div style={{ fontFamily: T.sans, fontSize: 10, letterSpacing: '.28em',
      fontWeight: 700, color: T.cyan, textTransform: 'uppercase', marginBottom: 10 }}>{children}</div>
  );
}

// ─── SCENE JUMPER ─────────────────────────────────────────────────
const SCENES = ['welcome','chat','generate','customize','arrival','party'];

function SceneJumper({ scene, onJump }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ position: 'fixed', top: 14, right: 14, zIndex: 9999, fontFamily: T.sans }}>
      <button onClick={() => setOpen(o => !o)} style={{
        padding: '7px 12px', borderRadius: 9999,
        background: 'rgba(0,0,0,.4)', color: 'rgba(255,255,255,.8)',
        border: '1px solid rgba(255,255,255,.15)',
        fontSize: 11, fontWeight: 600, letterSpacing: '.14em', textTransform: 'uppercase',
        cursor: 'pointer', backdropFilter: 'blur(12px)',
      }}>⎋ {scene}</button>
      {open && (
        <div style={{
          marginTop: 8, padding: 8,
          background: 'rgba(10,10,20,.85)', backdropFilter: 'blur(16px)',
          borderRadius: 14, border: '1px solid rgba(255,255,255,.12)',
          display: 'flex', flexDirection: 'column', gap: 4, minWidth: 160,
        }}>
          {SCENES.map((s, i) => (
            <button key={s} onClick={() => { onJump(s); setOpen(false); }} style={{
              padding: '8px 12px', textAlign: 'left', border: 'none', borderRadius: 9,
              background: s === scene ? 'rgba(8,145,178,.3)' : 'transparent',
              color: s === scene ? '#fff' : 'rgba(255,255,255,.7)',
              fontSize: 12, fontWeight: 600, cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 8,
            }}>
              <span style={{ fontSize: 10, opacity: .5, width: 14 }}>{i+1}.</span>{s}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────
function App() {
  const [scene, setScene] = useState(() => {
    if (window.SKIP_TO) return window.SKIP_TO;
    try { const s = localStorage.getItem('avakin:scene'); return (s && s !== 'welcome') ? s : 'chat'; } catch { return 'chat'; }
  });
  const [profile, setProfile] = useState(() => {
    try { return JSON.parse(localStorage.getItem('avakin:profile') || '{}'); } catch { return {}; }
  });

  useEffect(() => { try { localStorage.setItem('avakin:scene', scene); } catch {} }, [scene]);
  useEffect(() => { try { localStorage.setItem('avakin:profile', JSON.stringify(profile)); } catch {} }, [profile]);

  // Track which scene to return to when leaving customize
  const customizeBackRef = useRef('generate');

  const goCustomize = (backTo = 'generate') => {
    customizeBackRef.current = backTo;
    setScene('customize');
  };

  const go = (s) => setScene(s);

  return (
    <div className="scene-stack" data-scene={scene}>
      {scene === 'welcome'   && <WelcomeScene  onEnter={() => go('chat')} />}
      {scene === 'chat'      && <ChatScene     onComplete={(p) => { setProfile(p); go('generate'); }} />}
      {scene === 'generate'  && <GenerateScene profile={profile} onReveal={(choice, falImageUrl) => { if (falImageUrl) setProfile(p => ({ ...p, falImageUrl })); go(choice === 'edit' ? 'customize' : 'arrival'); }} />}
      {scene === 'customize' && <CustomizeScene profile={profile}
        onBack={() => go(customizeBackRef.current)}
        onDone={(newUrl) => {
          if (newUrl) setProfile(p => ({...p, falImageUrl: newUrl}));
          // After tweaking from party, go straight back; otherwise pass through arrival
          go(customizeBackRef.current === 'party' ? 'party' : 'arrival');
        }} />}
      {scene === 'arrival'   && <ArrivalScene  onArrived={() => go('party')} />}
      {scene === 'party'     && <PartyScene    profile={profile}
        onRestart={() => {
          try { localStorage.removeItem('avakin:scene'); localStorage.removeItem('avakin:profile'); } catch {}
          setProfile({}); go('chat');
        }}
        onGoCustomize={() => goCustomize('party')}
        onRestartWithAva={() => {
          try { localStorage.removeItem('avakin:scene'); localStorage.removeItem('avakin:profile'); } catch {}
          setProfile({}); go('chat');
        }}
      />}
      <SceneJumper scene={scene} onJump={go} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
